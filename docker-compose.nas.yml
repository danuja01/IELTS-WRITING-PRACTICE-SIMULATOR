# Dockge stack — copy this file to your NAS as docker-compose.yml
# Stack folder (example):
#   /srv/dev-disk-by-uuid-9ac22f70-05c6-442f-993b-0d9ca1ae5988/docker-compose/ielts-writing/
#
# Create data folder first (once):
#   /srv/.../appdata/ielts-writing/

services:
  ielts-writing:
    build: .
    container_name: ielts-writing
    ports:
      - "5050:5050"
    environment:
      # Change this to a long random string before first start
      SECRET_KEY: "CHANGE-ME-use-openssl-rand-hex-32"
      IELTS_DB: /app/data/app.db
      PORT: "5050"
    volumes:
      - /srv/dev-disk-by-uuid-9ac22f70-05c6-442f-993b-0d9ca1ae5988/appdata/ielts-writing:/app/data
    restart: unless-stopped
