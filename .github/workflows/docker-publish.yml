# Builds and pushes image to GitHub Container Registry on every push to main.
# After first run: GitHub → Packages → ielts-writing-practice-simulator → Package settings → Public

name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(tr -d ' \n\r' < VERSION)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/danuja01/ielts-writing-practice-simulator:latest
            ghcr.io/danuja01/ielts-writing-practice-simulator:${{ steps.version.outputs.version }}
            ghcr.io/danuja01/ielts-writing-practice-simulator:${{ github.sha }}
