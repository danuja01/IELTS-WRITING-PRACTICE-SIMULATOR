# Builds and pushes images to GitHub Container Registry on every push to main.
# Packages (set both public under GitHub → Packages if NAS pulls without auth):
#   ghcr.io/danuja01/ielts-writing-practice-simulator      — use with docker-compose.yml (SQLite)
#   ghcr.io/danuja01/ielts-writing-practice-postgres       — use with docker-compose.postgres.yml
# Same app image is published to both packages; pick the compose file for your database mode.

name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(tr -d ' \n\r' < VERSION)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/danuja01/ielts-writing-practice-simulator:latest
            ghcr.io/danuja01/ielts-writing-practice-simulator:${{ steps.version.outputs.version }}
            ghcr.io/danuja01/ielts-writing-practice-simulator:${{ github.sha }}
            ghcr.io/danuja01/ielts-writing-practice-postgres:latest
            ghcr.io/danuja01/ielts-writing-practice-postgres:${{ steps.version.outputs.version }}
            ghcr.io/danuja01/ielts-writing-practice-postgres:${{ github.sha }}
