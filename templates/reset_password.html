<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password — IELTS Writing Practice</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Reset password</h1>
      <p class="sub">Enter your email, the 6-digit code from your inbox, and a new password.</p>
      <p class="msg" id="msg"></p>
      <form id="reset-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ email }}" autocomplete="email" required>
        <label for="code">Reset code</label>
        <input type="text" id="code" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" autocomplete="one-time-code" required>
        <label for="password">New password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required>
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" autocomplete="new-password" required>
        <button type="submit" id="submit-btn">Update password</button>
      </form>
      <p class="auth-links">
        <a href="{{ url_for('forgot_password') }}">Request a new code</a>
        ·
        <a href="{{ url_for('login') }}">Back to login</a>
      </p>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/reset_password.js') }}"></script>
</body>
</html>
