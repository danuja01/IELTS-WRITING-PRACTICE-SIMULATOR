<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Writing — IELTS Practice</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ app_version }}">
</head>
<body class="practice-page">
  <div class="practice-shell">
    <header class="practice-bar">
      <div class="practice-bar-group practice-bar-timers">
        <span class="brand">IELTS Writing</span>
        <div class="timer-block">
          <div class="timer" id="timer-display">
            <span id="timer-main">40:00</span>
            <span class="timer-label" id="timer-label"> remaining</span>
          </div>
          <div class="timer timer-secondary" id="elapsed-display">
            <span id="elapsed-main">00:00</span>
            <span class="timer-label"> elapsed</span>
          </div>
        </div>
      </div>
      <div class="practice-bar-group practice-bar-sliders">
        <div class="editor-controls">
          <label for="font-size">Text</label>
          <input type="range" id="font-size" min="14" max="28" value="18" title="Text size">
        </div>
        <div class="editor-controls">
          <label for="line-height">Spacing</label>
          <input type="range" id="line-height" min="140" max="220" value="160" step="5" title="Line spacing">
        </div>
        <div class="editor-controls" id="chart-size-control" hidden>
          <label for="chart-size">Chart</label>
          <input type="range" id="chart-size" min="50" max="100" value="100" step="5" title="Chart size">
        </div>
      </div>
      <div class="practice-bar-group practice-bar-actions">
        <a href="{{ url_for('home') }}" class="btn secondary btn-compact">← Back</a>
        <button type="button" id="start-btn" class="btn-compact">Start</button>
        <button type="button" id="finish-btn" class="btn-compact" disabled>Finish</button>
      </div>
    </header>
    <div class="split">
      <section class="pane">
        <div class="pane-head">Question</div>
        <div class="question-body" id="question-pane">
          <p class="q-meta">Loading question…</p>
        </div>
        <div id="prompt-toolbar" class="prompt-toolbar" hidden>
          <button type="button" id="prompt-highlight-btn">Highlight yellow</button>
        </div>
      </section>
      <section class="pane write-pane">
        <div class="pane-head pane-head-write">Your answer</div>
        <textarea id="essay" placeholder="Click Start, then begin writing…" disabled spellcheck="true"></textarea>
        <div class="write-footer">
          <span id="save-status">Not started</span>
          <span id="sel-word-count" class="sel-word-count" hidden></span>
          <span class="write-autosave">Auto-saves every 15s</span>
          <span class="write-word-count">Words: <strong id="word-count">0</strong></span>
        </div>
      </section>
    </div>
  </div>
  <div id="essay-context-menu" class="ctx-menu">
    <span class="wc-label">0 words selected</span>
  </div>
  <div id="prompt-context-menu" class="ctx-menu">
    <button type="button" data-action="highlight">Highlight yellow</button>
  </div>
  <div class="modal-backdrop" id="result-modal">
    <div class="modal">
      <h3>Session complete</h3>
      <div class="stat-grid" id="result-stats"></div>
      <button type="button" id="modal-home">Back to questions</button>
    </div>
  </div>
  <script>
    window.QUESTION_ID = {{ question_id }};
  </script>
  <script src="{{ url_for('static', filename='js/practice.js') }}?v={{ app_version }}"></script>
</body>
</html>
