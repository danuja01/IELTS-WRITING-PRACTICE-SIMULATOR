<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot password — IELTS Writing Practice</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Forgot password</h1>
      <p class="sub">Enter the email on your account. We will send a 6-digit reset code.</p>
      <p class="msg" id="msg"></p>
      <form id="forgot-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
        <button type="submit" id="submit-btn">Send reset code</button>
      </form>
      <p class="auth-links">
        <a href="{{ url_for('reset_password') }}">Already have a code?</a>
        ·
        <a href="{{ url_for('login') }}">Back to login</a>
      </p>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/forgot_password.js') }}"></script>
</body>
</html>
