<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Set new password</h1>
      <p class="sub">Your administrator gave you a temporary password. Choose a new one.</p>
      <p class="msg" id="msg"></p>
      <form id="change-form">
        <label for="password">New password</label>
        <input type="password" id="password" required autocomplete="new-password">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" required autocomplete="new-password">
        <button type="submit">Save password</button>
      </form>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/change_password.js') }}"></script>
</body>
</html>
