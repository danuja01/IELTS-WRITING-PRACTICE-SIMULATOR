<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IELTS Writing Practice</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ app_version }}">
</head>
<body>
  <header class="topbar">
    <h1>IELTS Writing Practice <span class="version">v{{ app_version }}</span></h1>
    <span class="user">{{ username }}</span>
    <a href="{{ url_for('history_page') }}" class="btn secondary">History</a>
    <button type="button" class="secondary" id="logout-btn" style="border-color:#fff;color:#fff;background:transparent">Logout</button>
  </header>
  <main class="home-main">
    <section class="panel">
      <h2>Categories</h2>
      <form id="add-category-form" class="inline-form">
        <input type="text" id="cat-name" placeholder="e.g. IELTS 15" required>
        <button type="submit">Add category</button>
      </form>
      <ul class="tag-list" id="category-list"></ul>
    </section>
    <section class="panel">
      <h2>Add question</h2>
      <form id="add-question-form">
        <label for="q-title">Title</label>
        <input type="text" id="q-title" placeholder="e.g. Essay — Technology" required>
        <label for="q-category">Category (optional)</label>
        <select id="q-category"><option value="">Uncategorized</option></select>
        <label for="q-task">Task</label>
        <select id="q-task">
          <option value="task1">Task 1 (20 min)</option>
          <option value="task2" selected>Task 2 (40 min)</option>
        </select>
        <div id="task1-image-block" class="task1-image-block" hidden>
          <label for="q-image">Chart / diagram image (Task 1)</label>
          <input type="file" id="q-image" accept="image/png,image/jpeg,image/webp,image/gif">
          <p class="q-meta">Max 8 MB</p>
          <img id="q-image-preview" class="image-preview" alt="" hidden>
        </div>
        <label for="q-prompt">Question / prompt</label>
        <textarea id="q-prompt" rows="6" placeholder="Paste the IELTS question here..." required></textarea>
        <button type="submit">Save question</button>
      </form>
      <p class="msg" id="form-msg"></p>
    </section>
    <section class="panel">
      <h2>Your questions</h2>
      <div id="question-list"></div>
    </section>
    <section class="panel">
      <h2>Recent attempts</h2>
      <ul class="q-list" id="history-list">
        <li class="q-meta">Loading…</li>
      </ul>
      <p><a href="{{ url_for('history_page') }}">View full history →</a></p>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/home.js') }}?v={{ app_version }}"></script>
</body>
</html>
