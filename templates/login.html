<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IELTS Writing Practice — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>IELTS Writing Practice</h1>
      <p class="sub">Simple practice with timer &amp; word count · v{{ app_version }}</p>
      <div class="tabs">
        <button type="button" id="tab-login" class="active">Login</button>
        <button type="button" id="tab-register">Register</button>
      </div>
      <p class="msg" id="msg"></p>
      <form id="auth-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="submit" id="submit-btn">Login</button>
      </form>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
