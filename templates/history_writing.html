<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attempt detail</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar{% if admin_view %} topbar-admin{% endif %}">
    <h1 id="page-title">Attempt detail</h1>
    {% if admin_view %}
    <a id="back-link" href="{{ url_for('admin_home') }}" class="btn secondary">← User</a>
    {% else %}
    <a href="javascript:history.back()" class="btn secondary">← Back</a>
    {% endif %}
  </header>
  <main class="home-main" id="detail-root">
    <p class="q-meta">Loading…</p>
  </main>
  <div class="modal-backdrop" id="eval-modal">
    <div class="modal modal-eval">
      <div class="modal-eval-head">
        <h3>Writing Feedback</h3>
        <button type="button" class="modal-close" id="eval-modal-close" aria-label="Close">×</button>
      </div>
      <div id="eval-modal-body" class="eval-modal-body">
        <p class="q-meta">Loading…</p>
      </div>
      <div class="modal-eval-foot">
        <button type="button" class="link-btn" id="eval-regenerate" hidden>Regenerate</button>
      </div>
    </div>
  </div>
  <script>
    window.HISTORY_WRITING_ID = {{ writing_id }};
    window.ADMIN_VIEW = {{ 'true' if admin_view else 'false' }};
    window.ADMIN_USER_ID = {% if admin_view and user_id %}{{ user_id }}{% else %}null{% endif %};
  </script>
  <script src="{{ url_for('static', filename='js/history_writing.js') }}?v={{ app_version }}"></script>
</body>
</html>
