# Paste this entire file into Dockge — no git clone on the NAS.
# Requires: Docker Compose v2 + BuildKit (default on most NAS installs).
# On deploy, Docker downloads the repo from GitHub and builds the image.
#
# Change SECRET_KEY before first start (openssl rand -hex 32).

services:
  ielts-writing:
    build:
      context: https://github.com/danuja01/IELTS-WRITING-PRACTICE-SIMULATOR.git#main
      dockerfile: Dockerfile
    image: ielts-writing:local
    container_name: ielts-writing
    ports:
      - "5050:5050"
    environment:
      SECRET_KEY: "CHANGE-ME-use-openssl-rand-hex-32"
      IELTS_DB: /app/data/app.db
      PORT: "5050"
    volumes:
      - /srv/dev-disk-by-uuid-9ac22f70-05c6-442f-993b-0d9ca1ae5988/appdata/ielts-writing:/app/data
    restart: unless-stopped
